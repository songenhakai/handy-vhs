<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handy VHS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        .toolbar {
            width: 56px;
            background: #252525;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            border-right: 1px solid #333;
        }
        .toolbar button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover { background: #333; color: #fff; }
        .toolbar button.active { background: #ff6b6b; color: #fff; }
        .toolbar svg { width: 24px; height: 24px; fill: currentColor; }
        .toolbar .spacer { flex: 1; }
        
        .toggle-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 9px;
            color: #888;
        }
        .toggle-btn span { margin-top: 2px; }
        .toggle-btn.active { color: #ff6b6b; }
        
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            position: relative;
            overflow: hidden;
        }
        .canvas-wrap {
            position: relative;
        }
        .canvas-label {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
            pointer-events: none;
        }
        .canvas-label.vhs { color: #ff6b6b; }
        #src-canvas, #dst-canvas {
            display: block;
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #dst-canvas { display: none; }
        #dst-canvas.active { display: block; }
        #src-canvas.hidden { display: none; }
        
        .status-bar {
            height: 32px;
            background: #252525;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #333;
        }
        .status-bar .info { margin-left: auto; }
        
        .panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background: #252525;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 100;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
        }
        .panel.open { transform: translateX(0); }
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h2 { font-size: 14px; font-weight: 600; }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .section {
            margin-bottom: 20px;
        }
        .section h4 {
            font-size: 11px;
            color: #4ab0d9;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 2px solid #4ab0d9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        .row label {
            min-width: 90px;
            font-size: 12px;
            color: #ccc;
        }
        .row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            background: #333;
            height: 4px;
            border-radius: 2px;
        }
        .row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff6b6b;
            border-radius: 50%;
            cursor: pointer;
        }
        .row .val {
            min-width: 40px;
            text-align: right;
            font-family: 'SF Mono', monospace;
            font-size: 11px;
            color: #ff6b6b;
        }
        .row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #ff6b6b;
        }
        
        .btn-download {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-download:hover { background: #ff4757; }
        
        .processing {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .processing.active { display: flex; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="btn-toggle" class="toggle-btn active" title="Toggle Original/VHS">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            <span id="toggle-label">VHS</span>
        </button>
        <button id="btn-panel" title="Parameters">
            <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
        </button>
        <button id="btn-upload" title="Upload Image">
            <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        </button>
        <button id="btn-download" title="Download">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        </button>
        <div class="spacer"></div>
    </div>
    
    <div class="main-area">
        <div class="workspace">
            <div class="canvas-wrap">
                <div class="canvas-label" id="canvas-label">Original</div>
                <canvas id="src-canvas"></canvas>
                <canvas id="dst-canvas"></canvas>
            </div>
        </div>
        <div class="status-bar">
            <span id="status">Ready</span>
            <span class="info">Handy VHS</span>
        </div>
    </div>
    
    <div class="panel" id="panel">
        <div class="panel-header">
            <h2>Handy VHS</h2>
            <button id="btn-close-panel" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;">&times;</button>
        </div>
        <div class="panel-content">
            <div class="section">
                <h4>Digital Layer</h4>
                <div class="row">
                    <label><input type="checkbox" id="p_apply_jpeg" checked> JPEG</label>
                    <input type="range" id="p_jpeg_quality" min="1" max="100" value="100">
                    <span class="val" id="v_jpeg_quality">100</span>
                </div>
                <div class="row">
                    <label>Black Crush</label>
                    <input type="range" id="p_tone_low" min="0" max="50" value="17">
                    <span class="val" id="v_tone_low">17</span>
                </div>
                <div class="row">
                    <label>White Blowout</label>
                    <input type="range" id="p_tone_high" min="200" max="255" value="232">
                    <span class="val" id="v_tone_high">232</span>
                </div>
            </div>

            <div class="section">
                <h4>Hardware Layer</h4>
                <div class="row">
                    <label><input type="checkbox" id="p_apply_ringing" checked> Ringing</label>
                    <input type="range" id="p_sharpen_amount" min="0" max="10" step="0.1" value="1.3">
                    <span class="val" id="v_sharpen_amount">1.3</span>
                </div>
                <div class="row">
                    <label><input type="checkbox" id="p_apply_color_cast" checked> Color Cast</label>
                </div>
                <div class="row">
                    <label>Red</label>
                    <input type="range" id="p_cast_r" min="0.8" max="1.2" step="0.01" value="0.99">
                    <span class="val" id="v_cast_r">0.99</span>
                </div>
                <div class="row">
                    <label>Green</label>
                    <input type="range" id="p_cast_g" min="0.8" max="1.2" step="0.01" value="1.07">
                    <span class="val" id="v_cast_g">1.07</span>
                </div>
                <div class="row">
                    <label>Blue</label>
                    <input type="range" id="p_cast_b" min="0.8" max="1.2" step="0.01" value="0.93">
                    <span class="val" id="v_cast_b">0.93</span>
                </div>
            </div>

            <div class="section">
                <h4>Analog Layer</h4>
                <div class="row">
                    <label><input type="checkbox" id="p_auto_resolution" checked> Auto Resolution</label>
                </div>
                <div class="row" id="resolution-row" style="display: none;">
                    <label>Resolution</label>
                    <input type="range" id="p_vhs_resolution" min="160" max="480" step="10" value="280">
                    <span class="val" id="v_vhs_resolution">280</span>
                </div>
                <div class="row">
                    <label>Blur</label>
                    <input type="range" id="p_cutoff_y" min="0.01" max="1.0" step="0.01" value="0.73">
                    <span class="val" id="v_cutoff_y">0.73</span>
                </div>
                <div class="row">
                    <label>Chroma Shift</label>
                    <input type="range" id="p_chroma_shift_x" min="0" max="15" value="4">
                    <span class="val" id="v_chroma_shift_x">4</span>
                </div>
                <div class="row">
                    <label>Luma Noise</label>
                    <input type="range" id="p_noise_intensity_y" min="0" max="0.1" step="0.001" value="0.016">
                    <span class="val" id="v_noise_intensity_y">0.016</span>
                </div>
                <div class="row">
                    <label>Chroma Noise</label>
                    <input type="range" id="p_noise_intensity_c" min="0" max="0.1" step="0.001" value="0.046">
                    <span class="val" id="v_noise_intensity_c">0.046</span>
                </div>
            </div>

            <div class="section">
                <h4>Mechanical</h4>
                <div class="row">
                    <label>Jitter</label>
                    <input type="range" id="p_jitter_amp" min="0" max="5" step="0.1" value="0.5">
                    <span class="val" id="v_jitter_amp">0.5</span>
                </div>
                <div class="row">
                    <label>Head Switch</label>
                    <input type="range" id="p_head_switch_rows" min="0" max="50" value="4">
                    <span class="val" id="v_head_switch_rows">4</span>
                </div>
                <div class="row">
                    <label>Dropouts</label>
                    <input type="range" id="p_dropout_count" min="0" max="50" value="2">
                    <span class="val" id="v_dropout_count">2</span>
                </div>
                <div class="row">
                    <label><input type="checkbox" id="p_apply_scanlines" checked> Scanlines</label>
                    <input type="range" id="p_scanline_weight" min="0.5" max="1.0" step="0.01" value="0.91">
                    <span class="val" id="v_scanline_weight">0.91</span>
                </div>
            </div>
            
            <button class="btn-download" id="btn-download-panel">Download Image</button>
        </div>
    </div>
    
    <div class="processing" id="processing">
        <div class="spinner"></div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none">

    <script src="handy-vhs.js"></script>
    <script>
        const srcCanvas = document.getElementById('src-canvas');
        const dstCanvas = document.getElementById('dst-canvas');
        const panel = document.getElementById('panel');
        const processing = document.getElementById('processing');
        const vhs = new HandyVHS(dstCanvas);
        let showVHS = true;
        let hasProcessedImage = false;

        document.getElementById('btn-toggle').addEventListener('click', () => {
            showVHS = !showVHS;
            document.getElementById('btn-toggle').classList.toggle('active', showVHS);
            document.getElementById('toggle-label').textContent = showVHS ? 'VHS' : 'Original';
            document.getElementById('canvas-label').textContent = showVHS ? 'VHS Effect' : 'Original';
            document.getElementById('canvas-label').classList.toggle('vhs', showVHS);
            
            if (showVHS && hasProcessedImage) {
                srcCanvas.classList.add('hidden');
                dstCanvas.classList.add('active');
            } else {
                srcCanvas.classList.remove('hidden');
                dstCanvas.classList.remove('active');
            }
        });

        document.getElementById('btn-panel').addEventListener('click', () => {
            panel.classList.toggle('open');
            document.getElementById('btn-panel').classList.toggle('active', panel.classList.contains('open'));
        });
        document.getElementById('btn-close-panel').addEventListener('click', () => {
            panel.classList.remove('open');
            document.getElementById('btn-panel').classList.remove('active');
        });

        document.getElementById('btn-upload').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('status').textContent = 'Loading...';
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                const maxDim = 800;
                let w = img.width;
                let h = img.height;
                if (w > maxDim || h > maxDim) {
                    const ratio = Math.min(maxDim / w, maxDim / h);
                    w = Math.floor(w * ratio);
                    h = Math.floor(h * ratio);
                }
                srcCanvas.width = w;
                srcCanvas.height = h;
                srcCanvas.getContext('2d').drawImage(img, 0, 0, w, h);
                URL.revokeObjectURL(url);
                
                showVHS = true;
                document.getElementById('btn-toggle').classList.add('active');
                document.getElementById('toggle-label').textContent = 'VHS';
                document.getElementById('canvas-label').textContent = 'VHS Effect';
                document.getElementById('canvas-label').classList.add('vhs');
                srcCanvas.classList.add('hidden');
                
                processing.classList.add('active');
                document.getElementById('status').textContent = 'Processing...';
                setTimeout(() => {
                    autoProcess();
                    processing.classList.remove('active');
                    document.getElementById('status').textContent = 'Ready';
                    dstCanvas.classList.add('active');
                }, 50);
            };
            img.src = url;
        });

        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', (e) => {
                const valId = 'v_' + e.target.id.replace('p_', '');
                document.getElementById(valId).textContent = e.target.value;
                autoProcess();
            });
        });

        document.querySelectorAll('input[type="checkbox"]').forEach(input => {
            input.addEventListener('change', autoProcess);
        });

        document.getElementById('p_auto_resolution').addEventListener('change', (e) => {
            const resolutionRow = document.getElementById('resolution-row');
            resolutionRow.style.display = e.target.checked ? 'none' : 'flex';
            autoProcess();
        });

        let processTimeout = null;
        let isProcessing = false;

        function getParams() {
            const autoRes = document.getElementById('p_auto_resolution').checked;
            return {
                apply_jpeg: document.getElementById('p_apply_jpeg').checked,
                jpeg_quality: parseFloat(document.getElementById('p_jpeg_quality').value),
                apply_strong_ringing: document.getElementById('p_apply_ringing').checked,
                sharpen_amount: parseFloat(document.getElementById('p_sharpen_amount').value),
                tone_low: parseFloat(document.getElementById('p_tone_low').value),
                tone_high: parseFloat(document.getElementById('p_tone_high').value),
                vhs_resolution: autoRes ? 0 : parseInt(document.getElementById('p_vhs_resolution').value),
                cutoff_y: parseFloat(document.getElementById('p_cutoff_y').value),
                chroma_shift_x: parseInt(document.getElementById('p_chroma_shift_x').value),
                noise_intensity_y: parseFloat(document.getElementById('p_noise_intensity_y').value),
                noise_intensity_c: parseFloat(document.getElementById('p_noise_intensity_c').value),
                jitter_amp: parseFloat(document.getElementById('p_jitter_amp').value),
                head_switch_rows: parseInt(document.getElementById('p_head_switch_rows').value),
                dropout_count: parseInt(document.getElementById('p_dropout_count').value),
                apply_color_cast: document.getElementById('p_apply_color_cast').checked,
                cast_r: parseFloat(document.getElementById('p_cast_r').value),
                cast_g: parseFloat(document.getElementById('p_cast_g').value),
                cast_b: parseFloat(document.getElementById('p_cast_b').value),
                apply_scanlines: document.getElementById('p_apply_scanlines').checked,
                scanline_weight: parseFloat(document.getElementById('p_scanline_weight').value)
            };
        }

        function autoProcess() {
            if (!srcCanvas.width || isProcessing) return;
            
            clearTimeout(processTimeout);
            processTimeout = setTimeout(() => {
                isProcessing = true;
                vhs.setParams(getParams());
                vhs.originalImageData = srcCanvas.getContext('2d').getImageData(0, 0, srcCanvas.width, srcCanvas.height);
                vhs.canvas.width = srcCanvas.width;
                vhs.canvas.height = srcCanvas.height;
                vhs.process();
                isProcessing = false;
                hasProcessedImage = true;
                
                if (showVHS) {
                    dstCanvas.classList.add('active');
                    srcCanvas.classList.add('hidden');
                }
            }, 100);
        }

        function downloadImage() {
            if (!dstCanvas.width) {
                alert('Please upload an image first');
                return;
            }
            vhs.download();
        }

        document.getElementById('btn-download').addEventListener('click', downloadImage);
        document.getElementById('btn-download-panel').addEventListener('click', downloadImage);

        // Demo image with initial process
        (async () => {
            const demoImg = new Image();
            demoImg.crossOrigin = 'anonymous';
            demoImg.onload = () => {
                srcCanvas.width = 320;
                srcCanvas.height = 240;
                srcCanvas.getContext('2d').drawImage(demoImg, 0, 0, 320, 240);
                
                processing.classList.add('active');
                document.getElementById('status').textContent = 'Processing...';
                
                setTimeout(() => {
                    autoProcess();
                    processing.classList.remove('active');
                    document.getElementById('status').textContent = 'Ready';
                    
                    srcCanvas.classList.add('hidden');
                    dstCanvas.classList.add('active');
                }, 100);
            };
            demoImg.src = 'data:image/svg+xml,' + encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" width="320" height="240">
                    <defs>
                        <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#87CEEB"/>
                            <stop offset="100%" style="stop-color:#1E90FF"/>
                        </linearGradient>
                        <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#228B22"/>
                            <stop offset="100%" style="stop-color:#006400"/>
                        </linearGradient>
                    </defs>
                    <rect width="320" height="160" fill="url(#sky)"/>
                    <rect y="160" width="320" height="80" fill="url(#ground)"/>
                    <circle cx="60" cy="50" r="30" fill="#FFD700"/>
                    <ellipse cx="200" cy="140" rx="80" ry="20" fill="#2F4F2F" opacity="0.5"/>
                    <rect x="170" y="120" width="60" height="40" fill="#8B4513"/>
                    <polygon points="170,120 200,90 230,120" fill="#A0522D"/>
                    <rect x="190" y="135" width="20" height="25" fill="#4169E1"/>
                    <text x="160" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">DEMO IMAGE</text>
                </svg>
            `);
        })();
    </script>
</body>
</html>
